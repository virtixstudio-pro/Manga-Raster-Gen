name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev python3-dev zip unzip openjdk-17-jdk
        pip install --upgrade buildozer cython kivy pillow
    - name: Build APK with Buildozer
      run: |
        buildozer android debug
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MangaRasterGen-APK
        path: bin/*.apk
